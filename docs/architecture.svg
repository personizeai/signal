<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="signal-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="source-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="channel-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="sdk-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#f8fafc">How Signal Fits in Your Stack</text>
  <text x="480" y="66" text-anchor="middle" font-size="13" fill="#94a3b8">Your events flow in. AI decides who gets notified, when, and how.</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- YOUR APP (left column) -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="30" y="95" width="200" height="420" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="1.5">YOUR APP</text>

  <!-- Event sources -->
  <rect x="50" y="140" width="160" height="42" rx="8" fill="url(#source-grad)" filter="url(#shadow)"/>
  <text x="130" y="165" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">CRM Webhooks</text>

  <rect x="50" y="192" width="160" height="42" rx="8" fill="url(#source-grad)" filter="url(#shadow)"/>
  <text x="130" y="217" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Product Events</text>

  <rect x="50" y="244" width="160" height="42" rx="8" fill="url(#source-grad)" filter="url(#shadow)"/>
  <text x="130" y="269" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Usage Analytics</text>

  <rect x="50" y="296" width="160" height="42" rx="8" fill="url(#source-grad)" filter="url(#shadow)"/>
  <text x="130" y="321" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Sales Activity</text>

  <rect x="50" y="348" width="160" height="42" rx="8" fill="url(#source-grad)" filter="url(#shadow)"/>
  <text x="130" y="373" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Support Tickets</text>

  <text x="130" y="420" text-anchor="middle" font-size="11" fill="#64748b">Any event source</text>
  <text x="130" y="436" text-anchor="middle" font-size="11" fill="#64748b">via Sources API</text>

  <!-- Arrow: Your App → Signal -->
  <path d="M230 280 L280 280" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SIGNAL ENGINE (center) -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="280" y="95" width="380" height="420" rx="12" fill="#1e1b4b" stroke="url(#signal-grad)" stroke-width="2" filter="url(#shadow)"/>

  <!-- Signal badge -->
  <rect x="388" y="82" width="184" height="28" rx="14" fill="url(#signal-grad)" filter="url(#glow)"/>
  <text x="480" y="101" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">@personize/signal</text>

  <!-- Step 1: Pre-check -->
  <rect x="310" y="130" width="320" height="52" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
  <text x="336" y="148" font-size="10" font-weight="600" fill="#a5b4fc">STEP 1</text>
  <text x="336" y="168" font-size="12" font-weight="500" fill="#e0e7ff">Pre-check: dedup + daily cap (instant, free)</text>

  <!-- Step 2: Context -->
  <rect x="310" y="194" width="320" height="68" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
  <text x="336" y="214" font-size="10" font-weight="600" fill="#a5b4fc">STEP 2</text>
  <text x="336" y="232" font-size="12" font-weight="500" fill="#e0e7ff">Context Assembly (4 parallel calls)</text>
  <text x="336" y="250" font-size="10" fill="#818cf8">Rules + Entity Profile + History + Sent Log</text>

  <!-- Step 3: AI Decision -->
  <rect x="310" y="274" width="320" height="68" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="336" y="294" font-size="10" font-weight="600" fill="#a5b4fc">STEP 3</text>
  <text x="336" y="312" font-size="12" font-weight="500" fill="#e0e7ff">AI Decision Engine (score 0-100)</text>
  <!-- Decision badges -->
  <rect x="336" y="320" width="56" height="18" rx="9" fill="#059669"/>
  <text x="364" y="333" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">SEND</text>
  <rect x="400" y="320" width="60" height="18" rx="9" fill="#d97706"/>
  <text x="430" y="333" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">DEFER</text>
  <rect x="468" y="320" width="52" height="18" rx="9" fill="#64748b"/>
  <text x="494" y="333" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">SKIP</text>

  <!-- Step 4: Deliver + Learn -->
  <rect x="310" y="354" width="320" height="52" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
  <text x="336" y="374" font-size="10" font-weight="600" fill="#a5b4fc">STEP 4</text>
  <text x="336" y="392" font-size="12" font-weight="500" fill="#e0e7ff">Deliver + Memorize feedback (self-improving)</text>

  <!-- Step 5: Digest -->
  <rect x="310" y="418" width="320" height="52" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
  <text x="336" y="438" font-size="10" font-weight="600" fill="#a5b4fc">DIGEST</text>
  <text x="336" y="456" font-size="12" font-weight="500" fill="#e0e7ff">Weekly/daily compiled summaries per user</text>

  <!-- Arrow: Signal → Channels -->
  <path d="M660 280 L710 280" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="#10b981"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- DELIVERY CHANNELS (right column) -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="710" y="95" width="220" height="420" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="820" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="1.5">DELIVERY</text>

  <rect x="730" y="140" width="180" height="42" rx="8" fill="url(#channel-grad)" filter="url(#shadow)"/>
  <text x="820" y="165" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Email (SES / SendGrid)</text>

  <rect x="730" y="192" width="180" height="42" rx="8" fill="url(#channel-grad)" filter="url(#shadow)"/>
  <text x="820" y="217" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Slack</text>

  <rect x="730" y="244" width="180" height="42" rx="8" fill="url(#channel-grad)" filter="url(#shadow)"/>
  <text x="820" y="269" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">In-App Notifications</text>

  <rect x="730" y="296" width="180" height="42" rx="8" fill="url(#channel-grad)" filter="url(#shadow)"/>
  <text x="820" y="321" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">SMS (Twilio)*</text>

  <rect x="730" y="348" width="180" height="42" rx="8" fill="url(#channel-grad)" filter="url(#shadow)"/>
  <text x="820" y="373" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Webhooks</text>

  <text x="820" y="420" text-anchor="middle" font-size="11" fill="#64748b">Any channel via</text>
  <text x="820" y="436" text-anchor="middle" font-size="11" fill="#64748b">Channel interface</text>

  <text x="820" y="465" text-anchor="middle" font-size="10" fill="#475569">* = community contributed</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- PERSONIZE SDK (bottom bar) -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="280" y="535" width="380" height="60" rx="12" fill="#78350f" stroke="url(#sdk-grad)" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="470" y="560" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">Personize SDK</text>
  <text x="470" y="580" text-anchor="middle" font-size="11" fill="#fcd34d">Memory  |  Governance  |  AI  |  Workspaces</text>

  <!-- Arrow: Signal → SDK (bidirectional) -->
  <path d="M470 515 L470 535" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <path d="M450 535 L450 515" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="505" y="528" font-size="9" fill="#d97706">reads + writes</text>

  <!-- Legend -->
  <rect x="30" y="548" width="12" height="12" rx="3" fill="url(#source-grad)"/>
  <text x="48" y="559" font-size="11" fill="#94a3b8">Event Sources</text>
  <rect x="140" y="548" width="12" height="12" rx="3" fill="url(#signal-grad)"/>
  <text x="158" y="559" font-size="11" fill="#94a3b8">AI Engine</text>
  <rect x="230" y="548" width="12" height="12" rx="3" fill="url(#channel-grad)"/>
  <text x="248" y="559" font-size="11" fill="#94a3b8">Delivery</text>
  <rect x="30" y="570" width="12" height="12" rx="3" fill="url(#sdk-grad)"/>
  <text x="48" y="581" font-size="11" fill="#94a3b8">Intelligence Layer</text>

  <!-- Tagline -->
  <text x="480" y="610" text-anchor="middle" font-size="11" fill="#475569">personize.ai/signal</text>
</svg>
